name: darkdisco

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: darkdisco
      POSTGRES_USER: darkdisco
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-darkdisco}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U darkdisco"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-darkdisco-redis} --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-darkdisco-redis}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  tor:
    image: dperson/torproxy:latest
    ports:
      - "9052:9050"
      - "9053:9051"
    environment:
      PASSWORD: ${TOR_PASSWORD:-darkdisco-tor}

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: darkdisco
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-darkdisco-secret}
    ports:
      - "9002:9000"
      - "9003:9001"
    volumes:
      - miniodata:/data

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: uvicorn darkdisco.api.app:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/src
    ports:
      - "8100:8000"
    volumes:
      - ./src:/app/src
      - ./data:/app/data
    environment:
      DARKDISCO_DATABASE_URL: postgresql+asyncpg://darkdisco:${POSTGRES_PASSWORD:-darkdisco}@postgres:5432/darkdisco
      DARKDISCO_REDIS_URL: redis://:${REDIS_PASSWORD:-darkdisco-redis}@redis:6379/5
      DARKDISCO_CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-darkdisco-redis}@redis:6379/6
      DARKDISCO_CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-darkdisco-redis}@redis:6379/7
      DARKDISCO_TOR_SOCKS_PROXY: socks5h://tor:9050
      DARKDISCO_S3_ENDPOINT: http://minio:9000
      DARKDISCO_TELEGRAM_API_ID: ${TELEGRAM_API_ID:-0}
      DARKDISCO_TELEGRAM_API_HASH: ${TELEGRAM_API_HASH:-}
      DARKDISCO_TELEGRAM_SESSION_NAME: /app/data/darkdisco_monitor
      DARKDISCO_TRAPLINE_API_URL: ${DARKDISCO_TRAPLINE_API_URL:-}
      DARKDISCO_TRAPLINE_API_KEY: ${DARKDISCO_TRAPLINE_API_KEY:-}
      DARKDISCO_PASTEBIN_API_KEY: ${DARKDISCO_PASTEBIN_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: celery -A darkdisco.pipeline.worker worker -l info -c 4
    volumes:
      - ./src:/app/src
      - ./data:/app/data
    environment:
      DARKDISCO_DATABASE_URL: postgresql+asyncpg://darkdisco:${POSTGRES_PASSWORD:-darkdisco}@postgres:5432/darkdisco
      DARKDISCO_REDIS_URL: redis://:${REDIS_PASSWORD:-darkdisco-redis}@redis:6379/5
      DARKDISCO_CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-darkdisco-redis}@redis:6379/6
      DARKDISCO_CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-darkdisco-redis}@redis:6379/7
      DARKDISCO_TOR_SOCKS_PROXY: socks5h://tor:9050
      DARKDISCO_S3_ENDPOINT: http://minio:9000
      DARKDISCO_TELEGRAM_API_ID: ${TELEGRAM_API_ID:-0}
      DARKDISCO_TELEGRAM_API_HASH: ${TELEGRAM_API_HASH:-}
      DARKDISCO_TELEGRAM_SESSION_NAME: /app/data/darkdisco_monitor
      DARKDISCO_TRAPLINE_API_URL: ${DARKDISCO_TRAPLINE_API_URL:-}
      DARKDISCO_TRAPLINE_API_KEY: ${DARKDISCO_TRAPLINE_API_KEY:-}
      DARKDISCO_PASTEBIN_API_KEY: ${DARKDISCO_PASTEBIN_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      tor:
        condition: service_started

  beat:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: celery -A darkdisco.pipeline.worker beat -l info
    volumes:
      - ./src:/app/src
    environment:
      DARKDISCO_DATABASE_URL: postgresql+asyncpg://darkdisco:${POSTGRES_PASSWORD:-darkdisco}@postgres:5432/darkdisco
      DARKDISCO_REDIS_URL: redis://:${REDIS_PASSWORD:-darkdisco-redis}@redis:6379/5
      DARKDISCO_CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-darkdisco-redis}@redis:6379/6
      DARKDISCO_CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-darkdisco-redis}@redis:6379/7
    depends_on:
      redis:
        condition: service_healthy

  db-backup:
    build:
      context: ./docker
      dockerfile: Dockerfile.backup
    environment:
      PGHOST: postgres
      PGPORT: "5432"
      PGUSER: darkdisco
      PGPASSWORD: ${POSTGRES_PASSWORD:-darkdisco}
      PGDATABASE: darkdisco
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: darkdisco-backups
      S3_ACCESS_KEY: darkdisco
      S3_SECRET_KEY: ${MINIO_PASSWORD:-darkdisco-secret}
      BACKUP_RETENTION_DAYS: "7"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5174:80"
    depends_on:
      - api

volumes:
  pgdata:
  miniodata:
