# --------------------------------------------------------------------------
# Negative patterns — if ANY of these match, the mention is suppressed.
# These catch legitimate/benign conversations that happen to mention a bank.
# Patterns are Python regex (case-insensitive).
# --------------------------------------------------------------------------
negative_patterns:
  # Customer service / general banking
  - "customer service"
  - "what(?:'s| is) your experience with"
  - "anyone (?:use|bank with|have an account)"
  - "just opened an account"
  - "opened a (?:checking|savings) account"
  - "how do [iI] (?:open|close|transfer)"
  - "direct deposit"
  - "interest rate"
  - "credit score"
  - "annual fee"
  - "minimum balance"
  - "atm fee"
  - "overdraft (?:fee|protection)"
  - "mobile (?:app|banking|deposit)"
  - "zelle (?:limit|not working|setup)"
  - "\\bapp (?:update|crash|not working|review)\\b"
  - "branch (?:near|location|hours|closed)"

  # Employment / corporate
  - "(?:apply|applying|applied) (?:for|to) (?:a )?(?:job|position|role)"
  - "(?:hiring|we.re looking for)"
  - "job (?:posting|listing|opening|fair)"
  - "interview (?:with|at|for)"
  - "intern(?:ship)?"
  - "employee (?:review|benefit|handbook)"

  # News / press
  - "press release"
  - "quarterly (?:earnings|report|results)"
  - "annual report"
  - "stock (?:price|market|ticker)"
  - "(?:CEO|CFO|CTO) (?:of|at|said|announced)"
  - "merger|acquisition"
  - "ipo"

  # Product reviews / comparison
  - "(?:best|worst|top \\d+) (?:bank|credit union)"
  - "recommend(?:ation)?"
  - "review(?:s)? (?:of|for|on)"
  - "compared? to"
  - "vs\\.?\\s"
  - "pros (?:and|&) cons"
  - "rating"

  # Complaints (legitimate, not threat)
  - "filed a complaint"
  - "(?:cfpb|bbb|attorney general)"
  - "class action"
  - "lawsuit"

  # Promotions / marketing
  - "sign.up bonus"
  - "promo(?:tion| code)"
  - "referral (?:code|bonus|link)"
  - "cashback"
  - "rewards? (?:program|points)"

  # Generic fraud service advertisements (not institution-specific threats)
  # These are recurring spam ads for fraud tools/services that match on
  # generic keywords like "Global", "United" from country lists.
  # Patterns target the AD TEMPLATE STRUCTURE, not just keywords, to avoid
  # suppressing legitimate threat findings that happen to mention these services.

  # Bank loading / payment gateway service ads (structural patterns)
  - "bank loading (?:usa|uk|eu|canada)"
  - "premium global document solutions"
  - "(?:llc formation|ltd registration).{0,60}(?:ein|itin|ssn)"
  - "(?:ein|itin) documents?.{0,60}(?:selfie with id|driver license)"
  - "(?:gateways?|portals?).{0,30}(?:2d.{0,5}3d|3d.{0,5}2d)"

  # Generic payment gateway / 2D-3D seller spam
  - "(?:verified|fully).{0,20}(?:2d|3d).{0,10}(?:payment|gateway)"
  - "(?:2d|3d).{0,10}(?:payment|gateway).{0,30}(?:available|for sale)"
  - "payment gateway.{0,30}(?:shopify|stripe|square|paypal)"
  - "(?:i.m here to (?:offer|provide)|hello (?:everyone|customers)).{0,80}(?:payment gateway|shopify)"

  # Generic fraud service ad templates (emoji-heavy, multi-service listings)
  - "(?:stop losing|go global).{0,40}(?:payment|banking) solutions"
  - "(?:come make|make instant).{0,20}(?:legit|instant) money"
  - "(?:i.m|am) (?:active|here|doing).{0,30}(?:transfer|loading).{0,20}(?:all countries|worldwide)"
  - "(?:visit my shop|get (?:fully|your)).{0,30}(?:verified|payment gateway)"

  # KYC / fake document service ads
  - "(?:kyc|verification).{0,20}(?:service|seller|provider).{0,30}worldwide"
  - "(?:fake|counterfeit|editable).{0,20}(?:id|passport|dl|driver.?s? licen[sc]e)"
  - "(?:self registered|readymade).{0,20}(?:account|kyc)"

  # Generic bank open-up / account service spam (ad template, not specific bank targeting)
  - "(?:bank|banks).{0,10}(?:open up|opening).{0,20}(?:available|with cards)"
  - "(?:open up|opening).{0,10}(?:llc|business).{0,30}(?:available|service)"

  # VoIP / SIP service ads (only the full ad template, not keyword mentions)
  # These ads list countries + services together in a structured format
  - "(?:did numbers?|sip trunks?).{0,30}(?:countries available|available countries)"
  - "voip route.{0,10}(?:3cx|autodialer).{0,20}service provider"

  # Lead generation ads (structural: list format with multiple lead types)
  - "(?:b2b.{0,5}b2c|b2c.{0,5}b2b) leads?"
  - "all leads are geo.targeted"

  # Generic country flag lists in service ads
  # 4+ flag emojis in sequence = service ad listing coverage, not threat content
  - "(?:🇺🇸|🇬🇧|🇨🇦|🇦🇺).{0,5}(?:🇩🇪|🇫🇷|🇮🇹|🇪🇸).{0,5}(?:🇳🇱|🇧🇪|🇨🇭|🇦🇹)"
  - "countries (?:available|supported|covered).{0,60}(?:usa|united states|united kingdom)"
  - "global coverage.{0,20}(?:🇺🇸|🇬🇧|🇨🇦)"
