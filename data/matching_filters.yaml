# Noise reduction filters for the watch term matcher.
#
# These lists are loaded at matcher init and applied to mentions that match
# ONLY on institution_name or keyword type watch terms.  Matches on strong
# signal types (bin_range, routing_number, domain, regex) bypass these
# filters entirely.
#
# Restart the worker after editing:  docker compose restart worker

# --------------------------------------------------------------------------
# Fraud indicators — at least ONE must appear alongside the institution name
# for the mention to be promoted to a finding.  Case-insensitive substring
# match against the full mention text (title + content).
# --------------------------------------------------------------------------
fraud_indicators:
  # Card / account fraud
  - "fullz"
  - "cvv"
  - "cvv2"
  - "cc dump"
  - "card dump"
  - "dump+pin"
  - "track1"
  - "track2"
  - "track 1"
  - "track 2"
  - "magstripe"
  - "emv"
  - "skimmer"
  - "cloned card"
  - "carding"
  - "bin list"

  # Account takeover / credentials
  - "log"
  - "logs"
  - "stealer"
  - "infostealer"
  - "cookie"
  - "session token"
  - "credential"
  - "login"
  - "password"
  - "passwd"
  - "combo"
  - "combolist"
  - "brute"
  - "checker"
  - "config"
  - "cracked"
  - "account access"
  - "bank log"
  - "bank drop"
  - "cashout"
  - "cash out"
  - "cash app"
  - "zelle"
  - "ach"
  - "wire"
  - "wire transfer"

  # Money mule / drop
  - "mule"
  - "drop"
  - "money mule"
  - "drop address"
  - "reshipping"

  # Phishing / social engineering
  - "phish"
  - "scam page"
  - "scama"
  - "letter"
  - "spoof"
  - "clone site"
  - "fake page"
  - "kit"
  - "panel"
  - "mailer"
  - "smtp"
  - "inbox"
  - "redirect"

  # Data / breach
  - "breach"
  - "leak"
  - "dump"
  - "database"
  - "ssn"
  - "dob"
  - "social security"
  - "data for sale"
  - "selling"
  - "for sale"
  - "buy"
  - "price"
  - "btc"
  - "bitcoin"
  - "crypto"
  - "escrow"
  - "vouched"
  - "wickr"
  - "telegram"
  - "jabber"
